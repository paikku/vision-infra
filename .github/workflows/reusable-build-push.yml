# Reusable image build + push workflow.
#
# Called from app repos (vision, videonizer) so the build pipeline lives
# in one place. App repos only need a thin caller workflow that supplies
# the image name and (optionally) build args.
#
# Caller example (vision/.github/workflows/build.yml):
#
#   on:
#     push:
#       branches: [main]
#     pull_request:
#   jobs:
#     build:
#       uses: paikku/vision-infra/.github/workflows/reusable-build-push.yml@main
#       with:
#         image_name: vision
#         context: .
#         push: ${{ github.event_name == 'push' }}
#       secrets: inherit

name: reusable-build-push

on:
  workflow_call:
    inputs:
      image_name:
        description: "Image name (without registry prefix), e.g. `vision`"
        required: true
        type: string
      context:
        description: "Build context (repo-relative path)"
        required: false
        default: "."
        type: string
      dockerfile:
        description: "Dockerfile path (repo-relative)"
        required: false
        default: "Dockerfile"
        type: string
      push:
        description: "Push to registry (false on PRs)"
        required: false
        default: false
        type: boolean
      registry:
        description: "Registry hostname"
        required: false
        default: "ghcr.io"
        type: string
      build_args:
        description: "Multi-line BUILD_ARG=value pairs"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ${{ inputs.registry }}
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          repo_owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          base="${{ inputs.registry }}/${repo_owner_lc}/${{ inputs.image_name }}"
          {
            echo "image_base=${base}"
            echo "sha_tag=${base}:${GITHUB_SHA::12}"
            echo "branch_tag=${base}:${GITHUB_REF_NAME//\//-}"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          push: ${{ inputs.push }}
          tags: |
            ${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.branch_tag }}
          build-args: ${{ inputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
