# Reusable image build + push workflow.
#
# Called from app repos (vision, videonizer) so the build pipeline lives
# in one place. App repos only need a thin caller workflow that supplies
# the image name and (optionally) build args.
#
# Caller example (vision/.github/workflows/build.yml):
#
#   on:
#     push:
#       branches: [main]
#     pull_request:
#   jobs:
#     build:
#       uses: paikku/vision-infra/.github/workflows/reusable-build-push.yml@main
#       with:
#         image_name: vision
#         context: .
#         push: ${{ github.event_name == 'push' }}
#       secrets: inherit
#
# Registry config resolution (per field):
#   1. workflow input (`registry`, `image_prefix`)
#   2. repo/org variable (`vars.REGISTRY_URL`, `vars.IMAGE_PREFIX`)
#   3. fallback (`ghcr.io`, lowercased repo owner)
#
# Login credentials:
#   - secrets.REGISTRY_USERNAME / secrets.REGISTRY_PASSWORD when set
#     (private Harbor / mirror)
#   - falls back to github.actor + secrets.GITHUB_TOKEN (ghcr.io)

name: reusable-build-push

on:
  workflow_call:
    inputs:
      image_name:
        description: "Image name (without registry prefix), e.g. `vision`"
        required: true
        type: string
      context:
        description: "Build context (repo-relative path)"
        required: false
        default: "."
        type: string
      dockerfile:
        description: "Dockerfile path (repo-relative)"
        required: false
        default: "Dockerfile"
        type: string
      push:
        description: "Push to registry (false on PRs)"
        required: false
        default: false
        type: boolean
      registry:
        description: "Registry hostname override (e.g. harbor.example.com). Falls back to vars.REGISTRY_URL, then ghcr.io."
        required: false
        default: ""
        type: string
      image_prefix:
        description: "Path under registry (e.g. `paikku`). Falls back to vars.IMAGE_PREFIX, then lowercased repo owner."
        required: false
        default: ""
        type: string
      build_args:
        description: "Multi-line BUILD_ARG=value pairs"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Resolve registry config
        id: cfg
        env:
          INPUT_REGISTRY: ${{ inputs.registry }}
          INPUT_PREFIX: ${{ inputs.image_prefix }}
          VAR_REGISTRY: ${{ vars.REGISTRY_URL }}
          VAR_PREFIX: ${{ vars.IMAGE_PREFIX }}
          IMAGE_NAME: ${{ inputs.image_name }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          registry="${INPUT_REGISTRY:-${VAR_REGISTRY:-ghcr.io}}"

          if [ -n "$INPUT_PREFIX" ]; then
            prefix="$INPUT_PREFIX"
          elif [ -n "$VAR_PREFIX" ]; then
            prefix="$VAR_PREFIX"
          else
            prefix=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')
          fi

          base="${registry}/${prefix}/${IMAGE_NAME}"
          {
            echo "registry=${registry}"
            echo "image_base=${base}"
            echo "sha_tag=${base}:${GITHUB_SHA::12}"
            echo "branch_tag=${base}:${GITHUB_REF_NAME//\//-}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to ${{ steps.cfg.outputs.registry }}
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.cfg.outputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME != '' && secrets.REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD != '' && secrets.REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          push: ${{ inputs.push }}
          tags: |
            ${{ steps.cfg.outputs.sha_tag }}
            ${{ steps.cfg.outputs.branch_tag }}
          build-args: ${{ inputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
