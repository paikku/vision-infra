# Reusable image build + push workflow.
#
# Called from app repos (vision, videonizer) so the build pipeline lives
# in one place. App repos only need a thin caller workflow that supplies
# the image name and (optionally) build args.
#
# All images live under a single private registry path:
#   ${REGISTRY_URL}/${IMAGE_PREFIX}/<name>:<tag>
#
# Configuration:
#   - vars.REGISTRY_URL  (e.g. harbor.example.com)  REQUIRED for push
#   - vars.IMAGE_PREFIX  (e.g. paikku)              REQUIRED for push
#   - secrets.REGISTRY_USERNAME / secrets.REGISTRY_PASSWORD  required for push
#
# When inputs.push is false (PR builds) the workflow skips login and
# tag construction can fall back to ghcr.io for build-only verification.

name: reusable-build-push

on:
  workflow_call:
    inputs:
      image_name:
        description: "Image name (last segment under IMAGE_PREFIX), e.g. `vision`"
        required: true
        type: string
      context:
        description: "Build context (repo-relative path)"
        required: false
        default: "."
        type: string
      dockerfile:
        description: "Dockerfile path (repo-relative)"
        required: false
        default: "Dockerfile"
        type: string
      push:
        description: "Push to registry (false on PRs)"
        required: false
        default: false
        type: boolean
      build_args:
        description: "Multi-line BUILD_ARG=value pairs (REGISTRY_URL / IMAGE_PREFIX are auto-injected)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Resolve registry config
        id: cfg
        env:
          REGISTRY_URL: ${{ vars.REGISTRY_URL }}
          IMAGE_PREFIX: ${{ vars.IMAGE_PREFIX }}
          IMAGE_NAME: ${{ inputs.image_name }}
          PUSH: ${{ inputs.push }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          if [ "$PUSH" = "true" ]; then
            : "${REGISTRY_URL:?vars.REGISTRY_URL must be set to push images}"
            : "${IMAGE_PREFIX:?vars.IMAGE_PREFIX must be set to push images}"
            registry="$REGISTRY_URL"
            prefix="$IMAGE_PREFIX"
          else
            # PR build-only: fall back to ghcr.io / repo-owner so tag
            # construction stays well-formed even when registry vars
            # aren't configured (forks, new repos).
            registry="${REGISTRY_URL:-ghcr.io}"
            if [ -n "$IMAGE_PREFIX" ]; then
              prefix="$IMAGE_PREFIX"
            else
              prefix=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')
            fi
          fi

          base="${registry}/${prefix}/${IMAGE_NAME}"
          {
            echo "registry=${registry}"
            echo "prefix=${prefix}"
            echo "image_base=${base}"
            echo "sha_tag=${base}:${GITHUB_SHA::12}"
            echo "branch_tag=${base}:${GITHUB_REF_NAME//\//-}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to ${{ steps.cfg.outputs.registry }}
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.cfg.outputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          push: ${{ inputs.push }}
          tags: |
            ${{ steps.cfg.outputs.sha_tag }}
            ${{ steps.cfg.outputs.branch_tag }}
          # Auto-inject REGISTRY_URL / IMAGE_PREFIX so app Dockerfiles can
          # construct FROM lines from the same single source of truth.
          # Caller-provided build_args are appended after and win on conflict.
          build-args: |
            REGISTRY_URL=${{ steps.cfg.outputs.registry }}
            IMAGE_PREFIX=${{ steps.cfg.outputs.prefix }}
            ${{ inputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
