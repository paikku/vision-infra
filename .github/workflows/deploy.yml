# Production deploy — pulls the latest tagged images for vision +
# videonizer and rolls the stack on the operator host. Triggered
# manually so an operator can pin specific tags per release.

name: deploy

on:
  workflow_dispatch:
    inputs:
      vision_tag:
        description: "vision image tag (e.g. main, sha-abc1234)"
        required: true
        default: "main"
      videonizer_tag:
        description: "videonizer image tag"
        required: true
        default: "main"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose
        run: |
          cd compose
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.prod.yml \
            config >/dev/null

      - name: Roll the stack on khavipw01
        # Replace this stub with your real deploy step (ssh + compose up,
        # or kubectl apply once K8s is in play). Kept as a stub so the
        # workflow file is committable without infra access tokens.
        env:
          REGISTRY_URL: ${{ vars.REGISTRY_URL || 'ghcr.io' }}
          IMAGE_PREFIX: ${{ vars.IMAGE_PREFIX || 'paikku' }}
        run: |
          echo "Would deploy:"
          echo "  vision:     ${REGISTRY_URL}/${IMAGE_PREFIX}/vision:${{ inputs.vision_tag }}"
          echo "  videonizer: ${REGISTRY_URL}/${IMAGE_PREFIX}/videonizer:${{ inputs.videonizer_tag }}"
          echo "Wire up SSH key + remote 'docker compose pull && up -d' here."
