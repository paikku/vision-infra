# Base compose — defines the full vision stack: edge nginx + vision +
# videonizer + postgres + minio. Concrete deployment behavior (build vs
# pull, host vs named-volume mounts, resource limits) lives in the
# `docker-compose.dev.yml` / `docker-compose.prod.yml` overrides.
#
# All `image:` refs are derived from a single private registry path:
#   ${REGISTRY_URL}/${IMAGE_PREFIX}/<name>:<tag>
# REGISTRY_URL and IMAGE_PREFIX MUST be set in `.env`. The `:?` guard on
# each `image:` line below produces a clear error if either is empty —
# no safe public default exists under the airgap policy.
# Per-image tag overrides (POSTGRES_TAG, MINIO_TAG, NGINX_TAG, PYTHON_TAG,
# VISION_TAG, VIDEONIZER_TAG) let you pin specific versions without
# changing this file.
#
# All services join the `vision_net` bridge so service names resolve as
# DNS — DATABASE_URL=...@postgres:5432 / MINIO_ENDPOINT=minio:9000 work
# without any host networking. This is the same model used by a K8s
# Service: name resolution within a single namespace.

networks:
  vision_net:
    driver: bridge

volumes:
  pgdata: {}
  miniodata: {}

services:
  postgres:
    image: ${REGISTRY_URL:?set REGISTRY_URL in .env}/${IMAGE_PREFIX:?set IMAGE_PREFIX in .env}/postgres:${POSTGRES_TAG:-16-alpine}
    networks: [vision_net]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-videonizer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-videonizer}
      POSTGRES_DB: ${POSTGRES_DB:-videonizer}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-videonizer}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  minio:
    image: ${REGISTRY_URL:?set REGISTRY_URL in .env}/${IMAGE_PREFIX:?set IMAGE_PREFIX in .env}/minio:${MINIO_TAG:-latest}
    networks: [vision_net]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -fsS http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  videonizer-migrate:
    image: ${REGISTRY_URL:?set REGISTRY_URL in .env}/${IMAGE_PREFIX:?set IMAGE_PREFIX in .env}/videonizer:${VIDEONIZER_TAG:-dev}
    networks: [vision_net]
    command: ["alembic", "upgrade", "head"]
    # `environment:` defaults guarantee a working stack even with an empty
    # .env. The matching POSTGRES_* defaults wire to the embedded postgres
    # service. Operator-provided .env (env_file below) overrides these.
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-videonizer}:${POSTGRES_PASSWORD:-videonizer}@postgres:5432/${POSTGRES_DB:-videonizer}}
    env_file:
      - path: ./.env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  videonizer:
    image: ${REGISTRY_URL:?set REGISTRY_URL in .env}/${IMAGE_PREFIX:?set IMAGE_PREFIX in .env}/videonizer:${VIDEONIZER_TAG:-dev}
    networks: [vision_net]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-videonizer}:${POSTGRES_PASSWORD:-videonizer}@postgres:5432/${POSTGRES_DB:-videonizer}}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER:-minioadmin}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-minioadmin}}
      MINIO_BUCKET: ${MINIO_BUCKET:-videonizer}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    env_file:
      - path: ./.env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      videonizer-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 12
      # Generous start_period — videonizer eagerly resolves segmentation
      # backends at import time, and the first request can also pre-warm
      # the SAM model. 60s gives the cold-start path room without false
      # unhealthy flips during deploy.
      start_period: 60s
    restart: unless-stopped

  vision:
    image: ${REGISTRY_URL:?set REGISTRY_URL in .env}/${IMAGE_PREFIX:?set IMAGE_PREFIX in .env}/vision:${VISION_TAG:-dev}
    networks: [vision_net]
    depends_on:
      videonizer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  nginx-cert-init:
    # python ships openssl out of the box — picked because the bootstrap
    # must work in air-gapped environments where `apk add` / `apt-get
    # install` would fail.
    image: ${REGISTRY_URL:?set REGISTRY_URL in .env}/${IMAGE_PREFIX:?set IMAGE_PREFIX in .env}/python:${PYTHON_TAG:-3.12-slim}
    volumes:
      - ./nginx/certs:/certs
      - ./nginx/cert-init.sh:/cert-init.sh:ro
    entrypoint: ["sh", "/cert-init.sh"]
    restart: "no"

  nginx:
    image: ${REGISTRY_URL:?set REGISTRY_URL in .env}/${IMAGE_PREFIX:?set IMAGE_PREFIX in .env}/nginx:${NGINX_TAG:-1.27-alpine}
    networks: [vision_net]
    ports:
      - "${EDGE_HTTP_PORT:-80}:80"
      - "${EDGE_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      nginx-cert-init:
        condition: service_completed_successfully
      vision:
        condition: service_started
      videonizer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/edge-healthz | grep -q ok || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 5s
    restart: unless-stopped
