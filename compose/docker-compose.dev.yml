# Dev override — build images from sibling app repos with hot reload,
# expose internal ports for direct debugging, generate self-signed TLS
# certs on first nginx start.
#
# Hot reload:
#   - vision     → builds the Dockerfile `dev` target (`next dev` / HMR);
#                  ../../vision is bind-mounted onto /app, with anonymous
#                  volumes guarding /app/node_modules and /app/.next so
#                  the host doesn't shadow container state.
#   - videonizer → uvicorn `--reload` (UVICORN_RELOAD=1); ../../videonizer/app
#                  bind-mounted onto /srv/app.
#   - videonizer-migrate runs once and exits — no reload needed.
#
# The app Dockerfiles' FROM lines pull base images (node, python, ffmpeg)
# from ${REGISTRY_URL}/${IMAGE_PREFIX}/..., so REGISTRY_URL and
# IMAGE_PREFIX MUST be set in `.env` even for dev builds. Tag args
# (NODE_TAG / FFMPEG_TAG / PYTHON_TAG) inherit defaults from the
# Dockerfile when unset.
#
# Usage (from compose/):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# Assumes the layout:
#   parent/
#     vision/
#     videonizer/
#     vision-infra/   <- you are here

services:
  videonizer-migrate:
    build:
      context: ../../videonizer
      dockerfile: Dockerfile
      args:
        REGISTRY_URL: ${REGISTRY_URL:?set REGISTRY_URL in .env}
        IMAGE_PREFIX: ${IMAGE_PREFIX:?set IMAGE_PREFIX in .env}
        FFMPEG_TAG: ${FFMPEG_TAG:-7.1-ubuntu}
        PYTHON_TAG: ${PYTHON_TAG:-3.12-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}

  videonizer:
    build:
      context: ../../videonizer
      dockerfile: Dockerfile
      args:
        REGISTRY_URL: ${REGISTRY_URL:?set REGISTRY_URL in .env}
        IMAGE_PREFIX: ${IMAGE_PREFIX:?set IMAGE_PREFIX in .env}
        FFMPEG_TAG: ${FFMPEG_TAG:-7.1-ubuntu}
        PYTHON_TAG: ${PYTHON_TAG:-3.12-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
    environment:
      UVICORN_RELOAD: "1"
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ../../videonizer/app:/srv/app
    ports:
      # Direct access for `curl localhost:8000/healthz` and similar.
      - "8000:8000"

  vision:
    build:
      context: ../../vision
      dockerfile: Dockerfile
      target: dev
      args:
        REGISTRY_URL: ${REGISTRY_URL:?set REGISTRY_URL in .env}
        IMAGE_PREFIX: ${IMAGE_PREFIX:?set IMAGE_PREFIX in .env}
        NODE_TAG: ${NODE_TAG:-21-alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        # NEXT_PUBLIC_* are inlined by `next build` into the client bundle, so
        # split-domain deployments must override at build time. Default empty
        # — vision uses same-origin relative paths via the edge nginx.
        NEXT_PUBLIC_VIDEONIZER_URL: ${NEXT_PUBLIC_VIDEONIZER_URL:-}
        NEXT_PUBLIC_VIDEO_SEGMENT_ENDPOINT: ${NEXT_PUBLIC_VIDEO_SEGMENT_ENDPOINT:-}
        NEXT_PUBLIC_VIDEO_NORMALIZE_ENDPOINT: ${NEXT_PUBLIC_VIDEO_NORMALIZE_ENDPOINT:-}
    environment:
      WATCHPACK_POLLING: "true"
    volumes:
      - ../../vision:/app
      # Anonymous volumes preserve container-side state from being shadowed
      # by the host bind mount above. Without these, the host's empty (or
      # mismatched) node_modules/.next would replace what was baked into
      # the dev image, and `next dev` would crash on first request.
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"

  minio:
    ports:
      # MinIO console for browsing buckets in dev.
      - "9000:9000"
      - "9001:9001"

  postgres:
    ports:
      - "5432:5432"
