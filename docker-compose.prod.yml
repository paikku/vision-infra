# Prod override — pulls registry-tagged images (no build), bind-mounts
# data under /appdata/storage so backups and disk monitoring see all
# project state in one tree, applies resource limits matched to the
# khavipw01 host (16 vCPU / 31Gi RAM).
#
# Usage (from repo root):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Pre-flight (one-time, run as appuser, UID/GID 1000):
#
#   mkdir -p /appdata/storage/vision/{postgres,minio,temp}
#   mkdir -p /appdata/logs/vision/{nginx,postgres,videonizer}
#   mkdir -p /appdata/backup/vision
#
#   # Operator-managed .env at /appdata/app/vision-infra/.env with
#   # rotated credentials (POSTGRES_PASSWORD / MINIO_ROOT_PASSWORD /
#   # MINIO_SECRET_KEY etc) — chmod 600.
#
# TLS + IdP cert mounts live in the base compose (docker-compose.yml)
# so dev and prod read from the same /appdata/certs/vip/{sso,idp} tree.
# Operator-managed:
#   /appdata/certs/vip/sso/fullchain.pem    (edge nginx TLS)
#   /appdata/certs/vip/sso/privkey.pem      (edge nginx TLS)
#   /appdata/certs/vip/idp/saml-signing.pem (videonizer SSO id_token verify)
# Missing files / dirs make compose-up fail (no self-signed fallback).

services:
  postgres:
    user: "1000:1000"
    # External client access (psql/DBeaver/pgAdmin). Bound to 0.0.0.0 by
    # default — the host firewall MUST enforce a source-IP allowlist
    # before this stack faces a routable network. See
    # docs/external-access.md for the runbook.
    ports:
      - "5432:5432"
    environment:
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command: >
      postgres
        -c shared_buffers=512MB
        -c effective_cache_size=2GB
        -c work_mem=32MB
        -c maintenance_work_mem=128MB
        -c max_connections=50
        -c log_min_duration_statement=500
    volumes:
      - /appdata/storage/vision/postgres:/var/lib/postgresql/data
      - /appdata/logs/vision/postgres:/var/log/postgresql
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  minio:
    user: "1000:1000"
    # S3 API (:9000) for external clients (mc / boto3 / aws-cli) and the
    # web console (:9001). Same allowlist caveat as postgres above.
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - /appdata/storage/vision/minio:/data
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          memory: 2G

  videonizer-migrate:
    user: "1000:1000"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M

  videonizer:
    user: "1000:1000"
    environment:
      MAX_CONCURRENT_JOBS: "6"
      SEGMENT_MAX_CONCURRENT: "2"
      TEMP_DIR: "/srv/tmp"
    volumes:
      - /appdata/storage/vision/temp:/srv/tmp
      - /appdata/logs/vision/videonizer:/var/log/app
    deploy:
      resources:
        limits:
          cpus: "12"
          memory: 14G
        reservations:
          cpus: "4"
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"

  vision:
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G

  nginx:
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

# Override dev's named volumes with bind mounts so backups and disk
# monitoring see project state under one tree.
volumes:
  pgdata:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /appdata/storage/vision/postgres
  miniodata:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /appdata/storage/vision/minio
