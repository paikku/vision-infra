# Prod override — pulls registry-tagged images (no build), bind-mounts
# data under /appdata/storage so backups and disk monitoring see all
# project state in one tree, applies resource limits matched to the
# khavipw01 host (16 vCPU / 31Gi RAM).
#
# Usage (from repo root):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Pre-flight (one-time, run as appuser, UID/GID 1000):
#
#   mkdir -p /appdata/storage/vision/{postgres,minio,temp}
#   mkdir -p /appdata/logs/vision/{nginx,postgres,videonizer}
#   mkdir -p /appdata/backup/vision
#
#   # Operator-managed .env at /appdata/app/vision-infra/.env with
#   # rotated credentials (POSTGRES_PASSWORD / MINIO_ROOT_PASSWORD /
#   # MINIO_SECRET_KEY etc) — chmod 600.
#
#   # TLS + IdP certs (operator-managed, separate tree from /appdata/storage):
#   #   /appdata/certs/vip/sso/fullchain.pem    (edge nginx TLS)
#   #   /appdata/certs/vip/sso/privkey.pem      (edge nginx TLS)
#   #   /appdata/certs/vip/idp/saml-signing.pem (videonizer SSO id_token verify)
#   # All three are mounted :ro below with create_host_path:false, so a
#   # missing cert fails fast at compose-up instead of silently serving a
#   # self-signed cert (nginx) or 503-ing on first /v1/auth/callback
#   # (videonizer).

services:
  postgres:
    user: "1000:1000"
    environment:
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command: >
      postgres
        -c shared_buffers=512MB
        -c effective_cache_size=2GB
        -c work_mem=32MB
        -c maintenance_work_mem=128MB
        -c max_connections=50
        -c log_min_duration_statement=500
    volumes:
      - /appdata/storage/vision/postgres:/var/lib/postgresql/data
      - /appdata/logs/vision/postgres:/var/log/postgresql
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  minio:
    user: "1000:1000"
    environment:
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - /appdata/storage/vision/minio:/data
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          memory: 2G

  videonizer-migrate:
    user: "1000:1000"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M

  videonizer:
    user: "1000:1000"
    environment:
      MAX_CONCURRENT_JOBS: "6"
      SEGMENT_MAX_CONCURRENT: "2"
      TEMP_DIR: "/srv/tmp"
      # Pin the IdP signing-cert path so /v1/auth/callback can verify
      # id_token RS256 signatures against the cert mounted just below.
      AUTH_CERT_PATH: /run/secrets/idp/saml-signing.pem
    volumes:
      - /appdata/storage/vision/temp:/srv/tmp
      - /appdata/logs/vision/videonizer:/var/log/app
      # IdP signing cert. Long-form bind with create_host_path:false so
      # a missing /appdata/certs/vip/idp on the host fails compose-up
      # rather than letting docker auto-create an empty dir and then
      # 503-ing on the first /v1/auth/callback.
      - type: bind
        source: /appdata/certs/vip/idp
        target: /run/secrets/idp
        read_only: true
        bind:
          create_host_path: false
    deploy:
      resources:
        limits:
          cpus: "12"
          memory: 14G
        reservations:
          cpus: "4"
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"

  vision:
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G

  nginx-cert-init:
    # Re-mount the prod TLS cert dir read-only. cert-init.sh's [ -s ]
    # check short-circuits when both fullchain.pem and privkey.pem are
    # present and non-empty (the expected prod state). If they're missing
    # the script tries to write a self-signed pair — which fails on a :ro
    # mount, surfacing the problem at boot instead of silently serving a
    # self-signed cert. create_host_path:false additionally fails at
    # mount time if the host dir itself is absent.
    volumes:
      - type: bind
        source: /appdata/certs/vip/sso
        target: /certs
        read_only: true
        bind:
          create_host_path: false

  nginx:
    volumes:
      - type: bind
        source: /appdata/certs/vip/sso
        target: /etc/nginx/certs
        read_only: true
        bind:
          create_host_path: false
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

# Override dev's named volumes with bind mounts so backups and disk
# monitoring see project state under one tree.
volumes:
  pgdata:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /appdata/storage/vision/postgres
  miniodata:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /appdata/storage/vision/minio
