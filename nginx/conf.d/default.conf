# Edge routing — single origin in front of vision (Next.js) and videonizer
# (FastAPI). Maps cleanly to a K8s Ingress with two backend Services.

upstream vision_upstream {
    # vision compose service name; standalone Next.js on port 3000.
    server vision:3000;
    keepalive 32;
}

upstream videonizer_upstream {
    # videonizer compose service name; FastAPI on port 8000.
    server videonizer:8000;
    keepalive 32;
}

# Shared proxy headers — referenced from both routes.
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;
proxy_set_header Upgrade           $http_upgrade;
proxy_set_header Connection        $connection_upgrade;
proxy_http_version 1.1;

server {
    listen 80 default_server;
    server_name _;

    # Edge healthcheck — independent of upstreams so Docker can probe nginx
    # itself without depending on vision/videonizer being ready.
    location = /edge-healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Backend API — videonizer owns /v1/* per API_CONTRACT.md.
    location /v1/ {
        proxy_pass http://videonizer_upstream;
    }

    # Backend healthcheck passthrough — useful for ops dashboards.
    location = /healthz {
        proxy_pass http://videonizer_upstream;
    }

    # Everything else → vision (Next.js).
    location / {
        proxy_pass http://vision_upstream;
    }
}

server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    location = /edge-healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location /v1/ {
        proxy_pass http://videonizer_upstream;
    }

    location = /healthz {
        proxy_pass http://videonizer_upstream;
    }

    location / {
        proxy_pass http://vision_upstream;
    }
}
