# Edge routing — single origin in front of vision (Next.js) and videonizer
# (FastAPI). Maps cleanly to a K8s Ingress with two backend Services.
#
# TLS terminates here. /v1/* (videonizer) and / (vision) share the same
# origin so the access_token cookie issued by /v1/auth/callback also
# reaches vision's server components and Next.js middleware.

upstream vision_upstream {
    # vision compose service name; standalone Next.js on port 3000.
    server vision:3000;
    keepalive 32;
}

upstream videonizer_upstream {
    # videonizer compose service name; FastAPI on port 8000.
    server videonizer:8000;
    keepalive 32;
}

# Shared proxy headers — referenced from both routes.
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;
proxy_set_header Upgrade           $http_upgrade;
proxy_set_header Connection        $connection_upgrade;
# Forward the browser's auth cookie verbatim so videonizer can decode
# the access_token JWT (default behavior — kept explicit for reviewers).
proxy_set_header Cookie            $http_cookie;
proxy_pass_header Set-Cookie;
proxy_http_version 1.1;

# HTTP listener — only the docker healthcheck stays on plain HTTP; every
# other request is permanently redirected to HTTPS.
server {
    listen 80 default_server;
    server_name _;

    location = /edge-healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    # HSTS — once a browser has seen this header it refuses to talk
    # plain HTTP to this host for the next year. Drop or shorten if
    # you ever need to fall back to HTTP for debugging.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location = /edge-healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Backend API — videonizer owns /v1/* per API_CONTRACT.md, including
    # the /v1/auth/* surface (login / callback / me / logout). The
    # access_token cookie set by callback is scoped to this single
    # origin and travels back on every subsequent /v1/* call.
    location /v1/ {
        proxy_pass http://videonizer_upstream;
    }

    # Backend healthcheck passthrough — useful for ops dashboards.
    location = /healthz {
        proxy_pass http://videonizer_upstream;
    }

    # Everything else → vision (Next.js). Vision's middleware reads the
    # same access_token cookie to gate protected routes.
    location / {
        proxy_pass http://vision_upstream;
    }
}
