# Build-only override — builds prod images from sibling app repos and
# tags them with the names the base compose references. Pair with the
# base compose, do NOT stack on top of docker-compose.dev.yml (that
# override pins vision to `target: dev`, the HMR stage, not the prod
# `runner` stage).
#
# Usage (from repo root):
#   docker compose -f docker-compose.yml -f docker-compose.build.yml build vision videonizer
#   docker compose -f docker-compose.yml -f docker-compose.build.yml push  vision videonizer
#
# Image names + tags resolve from .env via the base compose:
#   ${REGISTRY_URL}/${IMAGE_PREFIX}/vision:${VISION_TAG}
#   ${REGISTRY_URL}/${IMAGE_PREFIX}/videonizer:${VIDEONIZER_TAG}
#
# Set VISION_TAG / VIDEONIZER_TAG in .env to whatever the prod stack
# will pull — same .env, same tags on both build host and prod host.
#
# Layout assumption (matches dev override):
#   parent/
#     vision/
#     videonizer/
#     vision-infra/   <- run from here

services:
  vision:
    build:
      context: ../vision
      dockerfile: Dockerfile
      # `target` unset → Dockerfile's last stage (`runner`) is built.
      # This is the prod image (`node server.js`); the dev override
      # builds the `dev` stage instead for HMR.
      args:
        REGISTRY_URL: ${REGISTRY_URL:?set REGISTRY_URL in .env}
        IMAGE_PREFIX: ${IMAGE_PREFIX:?set IMAGE_PREFIX in .env}
        NODE_TAG: ${NODE_TAG:-21-alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        NPM_PROXY: ${NPM_PROXY:-}
        NPM_HTTPS_PROXY: ${NPM_HTTPS_PROXY:-}
        NPM_STRICT_SSL: ${NPM_STRICT_SSL:-}

  videonizer:
    build:
      context: ../videonizer
      dockerfile: Dockerfile
      args:
        REGISTRY_URL: ${REGISTRY_URL:?set REGISTRY_URL in .env}
        IMAGE_PREFIX: ${IMAGE_PREFIX:?set IMAGE_PREFIX in .env}
        FFMPEG_TAG: ${FFMPEG_TAG:-7.1-ubuntu}
        PYTHON_TAG: ${PYTHON_TAG:-3.12-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}

  videonizer-migrate:
    # Same image as videonizer — declared here so a bare `compose build`
    # (no service name) still resolves a build context for the migrate
    # service, and the buildx cache is reused across the two.
    build:
      context: ../videonizer
      dockerfile: Dockerfile
      args:
        REGISTRY_URL: ${REGISTRY_URL:?set REGISTRY_URL in .env}
        IMAGE_PREFIX: ${IMAGE_PREFIX:?set IMAGE_PREFIX in .env}
        FFMPEG_TAG: ${FFMPEG_TAG:-7.1-ubuntu}
        PYTHON_TAG: ${PYTHON_TAG:-3.12-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
